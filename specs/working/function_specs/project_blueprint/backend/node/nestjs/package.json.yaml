file: project_blueprint/backend/node/nestjs/package.json
functions:
- name: get_dependencies
  parameters:
  - name: name
    type: string
    entity: package
  - name: version
    type: string
    entity: package
  return_type: list
  entity: package
  produces:
  - package.dependencies
  description: Returns a list of dependencies for a given package
- name: install_package
  parameters:
  - name: name
    type: string
    entity: package
  - name: version
    type: string
    entity: package
  return_type: string
  entity: package
  produces:
  - package.installation_status
  description: Installs a package with the specified version
