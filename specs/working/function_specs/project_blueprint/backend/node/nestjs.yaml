file: project_blueprint/backend/node/nestjs
functions:
- name: get_baked_goods
  parameters:
  - name: category
    type: string
    entity: product
  - name: limit
    type: number
    entity: pagination
  return_type: list
  entity: product
  produces: []
  description: Retrieves a list of baked goods based on the given category and limit
- name: create_order
  parameters:
  - name: id
    type: number
    entity: user
  - name: items
    type: object
    entity: cart
  return_type: number
  entity: order
  produces: []
  description: Creates a new order for the given customer and returns the order ID
- name: update_product
  parameters:
  - name: id
    type: number
    entity: product
  - name: details
    type: object
    entity: product
  return_type: object
  entity: product
  produces: []
  description: Updates the product details for the given product ID and returns the
    updated product
