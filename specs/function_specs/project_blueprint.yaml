file: project_blueprint
functions:
- name: register_user
  parameters:
  - name: username
    type: str
    entity: user
  - name: email
    type: str
    entity: user
  - name: password1
    type: str
    entity: user
  - name: password2
    type: str
    entity: user
  return_type: dict
  entity: user
  produces:
  - user.id
  - user.username
  - user.email
  description: Handle the registration of a new user by validating input and saving
    data to the database.
- name: login_user
  parameters:
  - name: username_or_email
    type: str
    entity: user
  - name: password
    type: str
    entity: user
  return_type: dict
  entity: session
  produces:
  - session.token
  description: Authenticate a user based on provided credentials and issue a session
    token.
- name: logout_user
  parameters:
  - name: request
    type: HttpRequest
    entity: http_request
  return_type: None
  entity: session
  produces: []
  description: Log out the currently authenticated user by invalidating their session.
- name: reset_password
  parameters:
  - name: email
    type: str
    entity: user
  return_type: dict
  entity: user
  produces: []
  description: Send a password reset link to the specified email address.
- name: verify_account
  parameters:
  - name: token
    type: str
    entity: session
  return_type: None
  entity: user
  produces: []
  description: Verify an account using a unique verification token sent via email.
