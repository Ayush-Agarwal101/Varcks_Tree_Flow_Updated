file: project_blueprint/backend/node
functions:
- name: create_bakery_item
  parameters:
  - name: item_name
    type: string
    entity: bakery_item
  - name: item_price
    type: number
    entity: bakery_item
  return_type: object
  entity: bakery_item
  produces:
  - bakery_item.created_item
  description: Handles creation of new bakery items.
- name: get_bakery_items
  parameters: []
  return_type: array
  entity: bakery_item
  produces:
  - bakery_item.list_of_items
  description: Retrieves a list of available bakery items.
- name: update_bakery_item
  parameters:
  - name: item_id
    type: number
    entity: bakery_item
  - name: new_price
    type: number
    entity: bakery_item
  return_type: object
  entity: bakery_item
  produces:
  - bakery_item.updated_item
  description: Updates the price of an existing bakery item.
