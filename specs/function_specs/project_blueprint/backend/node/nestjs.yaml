file: project_blueprint/backend/node/nestjs
functions:
- name: get_products
  parameters:
  - name: category
    type: string
    entity: product
  - name: limit
    type: number
    entity: product
  return_type: list
  entity: product
  produces:
  - product.list
  description: Retrieves a list of products based on the given category and limit
- name: create_order
  parameters:
  - name: customer_id
    type: number
    entity: user
  - name: products
    type: list
    entity: order
  return_type: number
  entity: order
  produces:
  - order.id
  description: Creates a new order for the given customer and products
- name: authenticate_user
  parameters:
  - name: username
    type: string
    entity: user
  - name: password
    type: string
    entity: user
  return_type: number
  entity: user
  produces:
  - user.id
  description: Authenticates a user based on the given username and password
