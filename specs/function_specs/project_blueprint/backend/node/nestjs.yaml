file: project_blueprint/backend/node/nestjs
functions:
- name: get_baked_goods
  parameters:
  - name: category
    type: string
    entity: product
  - name: limit
    type: number
    entity: pagination
  return_type: list
  entity: product
  produces:
  - product.list
  description: Retrieves a list of baked goods based on the given category and limit
- name: create_order
  parameters:
  - name: customer_id
    type: number
    entity: user
  - name: order_details
    type: object
    entity: order
  return_type: number
  entity: order
  produces:
  - order.id
  description: Creates a new order for the given customer and returns the order ID
- name: update_product
  parameters:
  - name: product_id
    type: number
    entity: product
  - name: product_details
    type: object
    entity: product
  return_type: object
  entity: product
  produces:
  - product.details
  description: Updates the product details for the given product ID and returns the
    updated product
