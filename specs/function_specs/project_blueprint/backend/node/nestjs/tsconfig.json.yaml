file: project_blueprint/backend/node/nestjs/tsconfig.json
functions:
- name: configure_compiler
  parameters:
  - name: options
    type: object
    entity: compiler
  return_type: string
  entity: compiler
  produces:
  - compiler.config
  description: Configures the TypeScript compiler
- name: resolve_modules
  parameters:
  - name: module_names
    type: array
    entity: module
  return_type: array
  entity: module
  produces:
  - module.paths
  description: Resolves the given module names to their corresponding file paths
