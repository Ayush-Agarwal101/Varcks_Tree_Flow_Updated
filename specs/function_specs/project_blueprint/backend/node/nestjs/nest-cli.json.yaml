file: project_blueprint/backend/node/nestjs/est-cli.json
functions:
- name: initializeProject
  parameters:
  - name: appName
    type: string
    entity: project
  return_type: None
  entity: project
  produces:
  - project.name
  - project.config
  description: Initializes a new NestJS project
- name: configureDependencies
  parameters:
  - name: dependenciesArray
    type: array
    entity: dependency
  return_type: None
  entity: project
  produces:
  - project.dependencies
  description: Adds dependencies to the project
- name: setupModules
  parameters:
  - name: modulesArray
    type: array
    entity: module
  return_type: None
  entity: project
  produces:
  - project.modules
  description: Sets up modules in the NestJS application
