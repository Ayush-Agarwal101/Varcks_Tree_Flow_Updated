file: project_blueprint/frontend/react_vite/src/functions.ts
functions:
- name: get_baked_goods
  parameters:
  - name: category
    type: string
    entity: product
  - name: limit
    type: number
    entity: pagination
  return_type: list
  entity: product
  produces:
  - product.list
  description: Retrieves a list of baked goods based on category and limit
- name: add_to_cart
  parameters:
  - name: item_id
    type: number
    entity: product
  - name: quantity
    type: number
    entity: order
  return_type: string
  entity: cart
  produces:
  - cart.status
  description: Adds an item to the user's cart and returns the update status
- name: checkout
  parameters:
  - name: cart_items
    type: list
    entity: cart
  return_type: string
  entity: order
  produces:
  - order.status
  description: Processes the checkout and returns the order status
