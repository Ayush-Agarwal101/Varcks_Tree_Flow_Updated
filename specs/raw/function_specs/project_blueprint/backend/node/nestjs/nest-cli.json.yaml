file: project_blueprint/backend/node/nestjs/est-cli.json
functions:
- name: initializeProject
  parameters:
  - name: appName
    type: string
    entity: project
  return_type: None
  entity: project
  produces:
  - project.name
  description: Initializes a new NestJS project with specified name and configurations
- name: configureDependencies
  parameters:
  - name: dependenciesArray
    type: array
    entity: dependency
  return_type: None
  entity: project
  produces:
  - project.dependencies
  description: Adds the provided dependencies to the project's package.json file and
    installs them
- name: setupModules
  parameters:
  - name: modulesArray
    type: array
    entity: module
  return_type: None
  entity: project
  produces:
  - project.modules
  description: Sets up the specified modules in the NestJS application, defining their
    structure and relationships
